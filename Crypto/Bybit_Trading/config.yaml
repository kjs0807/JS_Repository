# Bybit Trading System Configuration
app:
  mode: demo
  leverage: 3
  log_level: INFO

backtest:
  initial_capital: 50000.0
  taker_fee_pct: 0.00055
  maker_fee_pct: 0.0002
  slippage_pct: 0.0003

risk:
  max_position_pct: 0.05
  max_concurrent: 10
  daily_loss_limit_pct: 0.05
  max_drawdown_pct: 0.15

data:
  universe_size: 30
  history_days: 365
  default_timeframes:
    - 15m
    - 1h
    - 4h

alert:
  telegram_enabled: false
  alert_on_trade: true
  alert_on_error: true
  alert_on_daily_summary: true

# Round 5: BBKC be_trail 청산 운영 정책 (round 4 ROBUST_PROMOTE 1순위 후보)
bbkc_exit:
  mode: be_trail        # be_trail | fixed (env BBKC_EXIT_MODE로 override 가능)
  trail_be_at_tp_frac: 0.25
  trail_start_at_tp_frac: 0.60
  trail_distance_tp_frac: 0.30
  drop_tp: false
  time_stop_bars: 0
